apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "media-proxy-network-policy"
spec:
  endpointSelector:
    matchLabels:
      app: "media-proxy"
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: "kube-system"
            k8s-app: "kube-dns"
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "opensearch.internal.network"
        toPorts:
            - ports:
              - port: "443"
                protocol: TCP
    - toFQDNs:
        - matchName: "tracing.internal.network"
        toPorts:
            - ports:
              - port: "4317"
                protocol: TCP
              - port: "4318"
                protocol: TCP
    - toEntities:
        - host
        toPorts:
            - ports:
                - port: 123
                  protocol: UDP
                - port: 30928
                  protocol: TCP