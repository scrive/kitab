apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "media-proxy-networkpolicy"
spec:
  endpointSelector:
    matchLabels:
      app: "media-proxy"
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: "kube-system"
            k8s-app: "kube-dns"
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "opensearch.internal.network"
        - ports:
          - port: "443"
            protocol: TCP
    - toFQDNs:
        - matchName: "tracing.internal.network"
        - ports:
          - port: "4317"
            protocol: TCP
    - toEndpoints:
        - matchLabels:
            app: "redis"