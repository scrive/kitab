cradle:
  multi:
    - path: "./src/driver"
      config: { cradle: { cabal: { component: "lib:kitab" } } }
       
    - path: "./src/parser"
      config: { cradle: { cabal: { component: "lib:kitab" } } }

    - path: "./src/cli"
      config: { cradle: { cabal: { component: "lib:kitab" } } }

    - path: "./src/core"
      config: { cradle: { cabal: { component: "kitab:lib:kitab-core" } } }

    - path: "./src/puml"
      config: { cradle: { cabal: { component: "kitab:lib:kitab-puml" } } }

    - path: "./src/cilium"
      config: { cradle: { cabal: { component: "kitab:lib:kitab-cilium" } } }

    - path: "./src/gexf"
      config: { cradle: { cabal: { component: "kitab:lib:kitab-gexf" } } }

    - path: "./app/Main.hs"
      config: { cradle: { cabal: { component: "kitab:exe:kitab" } } }

    - path: "./test"
      config: { cradle: { cabal: { component: "kitab:test:kitab-test" } } }

    - path: "./test/golden"
      config: { cradle: { none: } }

    - path: "kitab-prelude/src"
      config: { cradle: { cabal: { component: "lib:kitab-prelude" } } }

